name: Deploy Webpapers to GitHub Pages

on:
  push:
    branches:
      - main # Chạy action mỗi khi bạn push code/PDF lên nhánh main
  workflow_dispatch: # Cho phép bạn bấm chạy thủ công trên giao diện GitHub nếu cần

# Cấp quyền cho GitHub Actions được phép ghi đè file lên GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 1. Kéo dữ liệu của bạn về (PDF & BibTeX)
        uses: actions/checkout@v4
        with:
          path: my-data

      - name: 2. Kéo mã nguồn engine của Webpapers về
        uses: actions/checkout@v4
        with:
          repository: ryichando/webpapers
          path: engine

      # ---- BƯỚC VÁ LỖI DOCKERFILE ĐÃ ĐƯỢC CHỈNH SỬA ----
      - name: 2.5. Vá lỗi thư viện cũ trong Dockerfile
        run: |
          cd engine
          # Chỉ đổi 'pikepdf' thành 'python3-pikepdf' ở dòng chứa lệnh apt-get
          sed -i '/apt-get/s/pikepdf/python3-pikepdf/g' Dockerfile
          
          # Sửa cú pháp cảnh báo ENV
          sed -i 's/ENV TERM xterm/ENV TERM=xterm/g' Dockerfile
          sed -i 's/ENV PYTHONDONTWRITEBYTECODE 1/ENV PYTHONDONTWRITEBYTECODE=1/g' Dockerfile
          
          # Ép pip bỏ qua PEP 668 để cài đặt bình thường trên Debian mới
          sed -i 's/pip install/pip install --break-system-packages/g' Dockerfile
      # ---------------------------------------------

      - name: 3. Build Docker Image cho Webpapers
        run: |
          cd engine
          docker build . -t webpapers

      - name: 4. Chạy Container để render giao diện Web
        run: |
          docker run -v ${{ github.workspace }}/my-data:/root --rm webpapers papers

      - name: 5. Cấu hình GitHub Pages
        uses: actions/configure-pages@v4

      - name: 6. Đóng gói thư mục thành Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './my-data/papers'

      - name: 7. Deploy lên mạng
        id: deployment
        uses: actions/deploy-pages@v4
